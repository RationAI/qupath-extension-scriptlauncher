name: Publish and Build Docker Image

run-name: >
  Image
  ${{ github.event_name == 'release' && github.ref_name
      || github.event_name == 'workflow_dispatch' && inputs.TAG_NAME
      || 'unknown-tag' }}

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      TAG_NAME:
        description: 'Tag name for test version'
        required: true
env:
  TAG_NAME: ${{ github.event.inputs.TAG_NAME || github.event.release.tag_name }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download QuPath v0.6.0 Linux
      run: |
        wget -q https://github.com/qupath/qupath/releases/download/v0.6.0/QuPath-v0.6.0-Linux.tar.xz
        tar -xf QuPath-v0.6.0-Linux.tar.xz

    - name: Download StarDist extension JAR
      run: |
        mkdir -p QuPath/v0.6/extensions/catalogs/QuPath\ catalog/QuPath\ StarDist\ extension/v0.6.0/main-jar/
        wget -q -O QuPath/v0.6/extensions/catalogs/QuPath\ catalog/QuPath\ StarDist\ extension/v0.6.0/main-jar/qupath-extension-stardist-0.6.0.jar \
          https://github.com/qupath/qupath-extension-stardist/releases/download/v0.6.0/qupath-extension-stardist-0.6.0.jar

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Packages
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ secrets.DOCKER_ACTION_USER }}
        password: ${{ secrets.DOCKER_ACTION_TOKEN }}

    - name: Build and push on release
      if: github.event_name == 'release'
      uses: docker/build-push-action@v6
      with:
        file: ./Dockerfile
        context: .
        push: true
        tags: |
          ghcr.io/Filip-Vrubel-Bachelor-Thesis/qupath-extension-scriptlauncher:${{ env.TAG_NAME }}
          ghcr.io/Filip-Vrubel-Bachelor-Thesis/qupath-extension-scriptlauncher:latest

    - name: Build and push on dispatch
      if: github.event_name != 'release'
      uses: docker/build-push-action@v6
      with:
        file: ./Dockerfile
        context: .
        push: true
        tags: |
          ghcr.io/Filip-Vrubel-Bachelor-Thesis/qupath-extension-scriptlauncher:${{ env.TAG_NAME }}
